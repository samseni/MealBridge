databases:
  - name: mealbridge-db
    databaseName: mealbridge
    user: mealbridge
    plan: free

services:
  # Backend API Server
  - type: web
    name: mealbridge-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mealbridge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: CLIENT_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: MATCH_RADIUS_METERS
        value: 10000
      - key: MAX_MATCHED_NGOS
        value: 50
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100